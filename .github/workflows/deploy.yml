name: Build and Deploy Resume

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build theme
        run: npx esbuild theme/build-entry.js --outfile=theme/dist/index.js --bundle --platform=node --format=cjs
      - name: Export to HTML
        run: npx resume export resume.html --theme ./theme
      - name: Create index.html
        run: sed 's|<head>|<head>\n  <base href="/resume/">|' resume.html > index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
